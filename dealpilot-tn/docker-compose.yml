version: '3.8'
services:
  dealpilot:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - GHL_API_KEY
      - GHL_LOCATION_ID
      - WHATSAPP_TOKEN
      - WHATSAPP_PHONE_NUMBER_ID
      - WHATSAPP_VERIFY_TOKEN
      - WHATSAPP_APP_SECRET
    restart: unless-stopped
